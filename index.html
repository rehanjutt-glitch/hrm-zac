<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایمپلائی مینجمنٹ سسٹم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. لاگ ان سیکشن -->
    <div id="login-container" class="auth-box">
        <h2>لاگ ان سسٹم</h2>
        <form id="login-form">
            <div class="input-group">
                <label>ای میل / یوزر نیم</label>
                <input type="email" id="login-email" required placeholder="اپنی ای میل درج کریں">
            </div>
            <div class="input-group">
                <label>پاس ورڈ</label>
                <input type="password" id="login-password" required placeholder="پاس ورڈ درج کریں">
            </div>
            <button type="submit" class="btn">لاگ ان کریں</button>
        </form>
    </div>

    <!-- 2. مین ایڈمن ڈیش بورڈ (شروع میں چھپا ہوا ہوگا) -->
    <div id="dashboard-container" class="dashboard" style="display: none;">
        
        <!-- ٹاپ بار اور پروفائل -->
        <header class="top-bar">
            <div class="user-profile">
                <span id="user-role-badge" class="badge">ایڈمن</span>
                <div class="profile-avatar">
                    <img id="profile-img" src="https://via.placeholder.com/150" alt="Profile">
                    <input type="file" id="upload-avatar" accept="image/*" style="display:none;">
                    <label for="upload-avatar" class="upload-btn">📸</label>
                </div>
            </div>
            <h1>ایڈمن پینل - ملازمین کا ریکارڈ</h1>
            <button id="logout-btn" class="btn btn-danger">لاگ آؤٹ</button>
        </header>

        <!-- مینیو اور مین کنٹینٹ -->
        <div class="main-layout">
            
            <!-- سائیڈ بار (ایکسیس کنٹرول کے لیے) -->
            <nav class="sidebar">
                <ul>
                    <li><a href="#summary" class="active">خلاصہ (Summary)</a></li>
                    <li><a href="#salary-calc">سیلری کیلکولیٹر</a></li>
                    <li id="admin-only-link"><a href="#user-management">صارفین کی مینجمنٹ (Admin)</a></li>
                </ul>
            </nav>

            <!-- مین کنٹینٹ ایریا -->
            <main class="content-area">
                
                <!-- کارڈز: ملازمین کی تعداد -->
                <section id="summary" class="stats-grid">
                    <div class="card blue">
                        <h3>کل ملازمین</h3>
                        <p id="total-employees">0</p>
                    </div>
                    <div class="card green">
                        <h3>ایکٹو (Active)</h3>
                        <p id="active-employees">0</p>
                    </div>
                    <div class="card red">
                        <h3>ان ایکٹو (Inactive)</h3>
                        <p id="inactive-employees">0</p>
                    </div>
                </section>

                <hr>

                <!-- سیلری اور اٹینڈنس سیکشن -->
                <section id="salary-calc" class="management-section">
                    <h2>ماہانہ و ڈیلی ویجز سیلری کیلکولیٹر</h2>
                    <form id="salary-form">
                        <div class="form-row">
                            <input type="text" id="emp-name" placeholder="ملازم کا نام" required>
                            <select id="emp-type">
                                <option value="monthly">ماہانہ (Monthly)</option>
                                <option value="daily">ڈیلی ویجر (Daily Wager)</option>
                            </select>
                            <input type="number" id="base-salary" placeholder="بنیادی تنخواہ / روزانہ کی اجرت" required>
                            <input type="number" id="leaves-days" placeholder="چھٹیاں (Days)">
                        </div>
                        <button type="button" onclick="calculateSalary()" class="btn">تنخواہ معلوم کریں</button>
                    </form>
                    <div class="salary-result">
                        <h3>کل قابل ادائیگی تنخواہ: <span id="final-salary">0</span> PKR</h3>
                    </div>
                </section>

                <hr>

                <!-- یوزر کریٹ اور ایکسیس کنٹرول (صرف ایڈمن کے لیے) -->
                <section id="user-management" class="management-section">
                    <h2>نیا یوزر بنائیں اور ایکسیس دیں</h2>
                    <form id="create-user-form">
                        <div class="form-row">
                            <input type="text" id="new-username" placeholder="یوزر نیم" required>
                            <input type="email" id="new-user-email" placeholder="ای میل" required>
                            <select id="new-user-role">
                                <option value="staff">عام اسٹاف (Staff)</option>
                                <option value="manager">مینیجر (Manager)</option>
                                <option value="admin">ایڈمن (Admin)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">یوزر شامل کریں</button>
                    </form>
                </section>

            </main>
        </div>
    </div>

    <!-- یہاں جاوا اسکرپٹ فائل لنک ہوگی -->
    <script src="script.js"></script>
</body>
</html>
