<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM Cloud System - Meskay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; color: #000000; }
        .container { width: 90%; max-width: 800px; margin: 50px auto; padding: 30px; border: 2px solid #000000; text-align: center; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #000000; box-sizing: border-box; font-size: 16px; text-align: center; }
        .main-btn { width: 100%; padding: 15px; background: #000000; color: #ffffff; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .main-btn:hover { background: #333333; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .menu-btn { padding: 30px; background: #000000; color: #ffffff; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000000; padding: 12px; text-align: center; }
        th { background: #000000; color: #ffffff; }
        .eye-icon { position: absolute; right: 15px; top: 25px; cursor: pointer; color: #000000; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="hidden">LOADING DATA...</div>

    <div id="loginPage" class="container">
        <h1>HRM CLOUD LOGIN</h1>
        <input type="text" id="username" placeholder="USERNAME">
        <div style="position: relative;">
            <input type="password" id="password" placeholder="PASSWORD">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
        </div>
        <button class="main-btn" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <h2 id="welcomeText">WELCOME</h2>
        <div class="menu-grid">
            <button class="menu-btn" onclick="navTo('listPage')">EMPLOYEE LIST</button>
            <button id="btnAdd" class="menu-btn" onclick="navTo('addPage')">ADD EMPLOYEE</button>
            <button id="btnAdmin" class="menu-btn hidden" onclick="navTo('adminPage')">ADMIN PANEL</button>
            <button class="menu-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div id="adminPage" class="container hidden">
        <h2>ADMIN PANEL - CLOUD USERS</h2>
        <div style="border: 1px solid #000; padding: 15px; margin-bottom: 20px;">
            <h4>CREATE NEW USER</h4>
            <input type="text" id="newU" placeholder="NEW USERNAME">
            <input type="text" id="newP" placeholder="NEW PASSWORD">
            <div style="text-align: left; padding: 10px;">
                <label><input type="checkbox" id="pAdd"> CAN ADD DATA</label><br>
                <label><input type="checkbox" id="pDel"> CAN DELETE DATA</label>
            </div>
            <button class="main-btn" onclick="createNewUser()">SAVE TO CLOUD</button>
        </div>
        <h4>CLOUD USERS LIST</h4>
        <table>
            <thead><tr><th>NAME</th><th>ACTION</th></tr></thead>
            <tbody id="userListBody"></tbody>
        </table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="listPage" class="container hidden">
        <h2>EMPLOYEE DATABASE (CLOUD)</h2>
        <input type="text" onkeyup="searchEmp(this.value)" placeholder="SEARCH...">
        <table>
            <thead><tr><th>ID</th><th>NAME</th><th>DESIG</th><th>PHONE</th><th>ACTION</th></tr></thead>
            <tbody id="empListBody"></tbody>
        </table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="addPage" class="container hidden">
        <h2>ADD EMPLOYEE</h2>
        <input type="text" id="eId" placeholder="ID">
        <input type="text" id="eName" placeholder="NAME">
        <input type="text" id="eDes" placeholder="DESIGNATION">
        <input type="text" id="ePho" placeholder="PHONE">
        <button class="main-btn" onclick="saveEmployee()">SAVE TO CLOUD</button>
        <button class="main-btn" style="background:#444" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // آپ کا فراہم کردہ فائربیس کنفیگ
        const firebaseConfig = {
            apiKey: "AIzaSyDrzmh9TbcyuLAG6LkoKERcBuHvQ-sf0oU",
            authDomain: "my-hrm-project-d1aef.firebaseapp.com",
            projectId: "my-hrm-project-d1aef",
            storageBucket: "my-hrm-project-d1aef.firebasestorage.app",
            messagingSenderId: "165053525844",
            appId: "1:165053525844:web:6abc82aca238d9e84862c1"
        };

        // فائربیس شروع کریں
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const MASTER_ADMIN = "Meskay";
        const MASTER_PASS = "Pakistan786";

        function navTo(pageId) {
            window.location.hash = pageId;
            renderPage(pageId);
        }

        window.onhashchange = function() {
            const page = window.location.hash.replace('#', '') || 'loginPage';
            renderPage(page);
        };

        function renderPage(pageId) {
            const loggedIn = sessionStorage.getItem("isLoggedIn");
            if (!loggedIn && pageId !== 'loginPage') pageId = 'loginPage';
            
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(pageId)?.classList.remove('hidden');
            
            if(pageId === 'adminPage') fetchUsers();
            if(pageId === 'listPage') fetchEmployees();
            setupPermissions();
        }

        // کلاؤڈ لاگ ان
        async function handleLogin() {
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            
            if(u === MASTER_ADMIN && p === MASTER_PASS) {
                const adminObj = {name: u, role: 'admin', pAdd: true, pDel: true};
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("currentUser", JSON.stringify(adminObj));
                navTo('dashboardPage');
                return;
            }

            // فائربیس سے یوزر چیک کریں
            const snapshot = await db.collection("users").where("name", "==", u).where("pass", "==", p).get();
            if(!snapshot.empty) {
                const userObj = snapshot.docs[0].data();
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("currentUser", JSON.stringify(userObj));
                navTo('dashboardPage');
            } else {
                alert("INVALID CLOUD LOGIN!");
            }
        }

        function setupPermissions() {
            const user = JSON.parse(sessionStorage.getItem("currentUser"));
            if(!user) return;
            document.getElementById("welcomeText").innerText = "USER: " + user.name.toUpperCase();
            
            const adminBtn = document.getElementById("btnAdmin");
            adminBtn.classList.toggle("hidden", user.name !== MASTER_ADMIN);

            const addBtn = document.getElementById("btnAdd");
            if(addBtn) addBtn.style.display = (user.pAdd || user.name === MASTER_ADMIN) ? "block" : "none";
        }

        // فائربیس یوزرز
        async function createNewUser() {
            const n = document.getElementById("newU").value;
            const p = document.getElementById("newP").value;
            if(!n || !p) return alert("EMPTY!");

            await db.collection("users").add({
                name: n, pass: p, role: 'user', 
                pAdd: document.getElementById("pAdd").checked, 
                pDel: document.getElementById("pDel").checked
            });
            alert("USER SAVED TO CLOUD!");
            fetchUsers();
        }

        async function fetchUsers() {
            const body = document.getElementById("userListBody");
            body.innerHTML = "Loading...";
            const snapshot = await db.collection("users").get();
            body.innerHTML = "";
            snapshot.forEach(doc => {
                const u = doc.data();
                body.innerHTML += `<tr><td>${u.name}</td><td><button onclick="deleteDoc('users','${doc.id}', fetchUsers)">REMOVE</button></td></tr>`;
            });
        }

        // فائربیس ایمپلائی ڈیٹا
        async function saveEmployee() {
            const emp = { 
                id: document.getElementById("eId").value, 
                name: document.getElementById("eName").value, 
                des: document.getElementById("eDes").value, 
                pho: document.getElementById("ePho").value 
            };
            await db.collection("employees").add(emp);
            alert("SAVED TO GOOGLE CLOUD!");
            navTo('listPage');
        }

        async function fetchEmployees() {
            const body = document.getElementById("empListBody");
            body.innerHTML = "Syncing...";
            const user = JSON.parse(sessionStorage.getItem("currentUser"));
            const snapshot = await db.collection("employees").get();
            body.innerHTML = "";
            snapshot.forEach(doc => {
                const e = doc.data();
                const delBtn = (user.name === MASTER_ADMIN || user.pDel) ? `<button onclick="deleteDoc('employees','${doc.id}', fetchEmployees)">DEL</button>` : "-";
                body.innerHTML += `<tr><td>${e.id}</td><td>${e.name}</td><td>${e.des}</td><td>${e.pho}</td><td>${delBtn}</td></tr>`;
            });
        }

        async function deleteDoc(coll, id, callback) {
            if(confirm("DELETE PERMANENTLY FROM CLOUD?")) {
                await db.collection(coll).doc(id).delete();
                callback();
            }
        }

        function searchEmp(val) {
            const filter = val.toUpperCase();
            const tr = document.getElementById("empListBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                tr[i].style.display = tr[i].innerText.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        function togglePass() {
            const p = document.getElementById("password");
            p.type = p.type === "password" ? "text" : "password";
        }

        function logout() {
            sessionStorage.clear();
            navTo('loginPage');
        }

        window.onload = function() {
            const hash = window.location.hash.replace('#', '');
            renderPage(hash || 'loginPage');
        }
    </script>
</body>
</html>
