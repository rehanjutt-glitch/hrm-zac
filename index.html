<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM MASTER - SECURE</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-align: center; color: #333; }
        .container { width: 95%; max-width: 900px; margin: 20px auto; background: #fff; padding: 25px; border: 3px solid #000; box-shadow: 10px 10px 0 #000; border-radius: 8px; }
        .hidden { display: none !important; } /* اب یہ سختی سے ہائیڈ کرے گا */
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #000; font-size: 16px; box-sizing: border-box; font-weight: bold; }
        .main-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }
        .btn-blue { background: #007bff; color: white; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 25px 10px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; position: relative; border-radius: 5px; }
        .badge { display: block; font-size: 24px; color: #ffeb3b; margin-top: 8px; }
        .master-btn { grid-column: span 2; background: #1a237e; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 2px solid #000; padding: 12px; text-align: center; }
        th { background: #eee; }

        /* Modal / Detail View Styling */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .detail-card { background: #fff; padding: 30px; border: 4px solid #000; width: 90%; max-width: 500px; text-align: left; position: relative; border-radius: 10px; box-shadow: 10px 10px 0px #000; }
        .detail-row { margin: 15px 0; font-size: 18px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .detail-row strong { color: #000; width: 140px; display: inline-block; }

        @media print { .no-print { display: none; } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loginPage" class="container">
        <h1>HRM LOGIN</h1>
        <p>Enter credentials to access system</p>
        <input type="text" id="username" placeholder="Username / Login ID">
        <input type="password" id="password" placeholder="Password">
        <button class="main-btn" onclick="handleLogin()">SECURE LOGIN</button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <h2>WELCOME ADMIN</h2>
        <div class="menu-grid">
            <button class="menu-btn" onclick="showView('all')">ALL EMPLOYEES <span class="badge" id="cntAll">0</span></button>
            <button class="menu-btn" onclick="showView('Active')">ACTIVE STAFF <span class="badge" id="cntActive">0</span></button>
            <button class="menu-btn" onclick="navTo('addPage')">ADD NEW STAFF</button>
            <button class="menu-btn master-btn" onclick="navTo('salaryPage')" style="background:#2e7d32">SALARY CALCULATOR</button>
            <button class="menu-btn master-btn" onclick="navTo('reportPage')" style="background:#01579b">REPORTS & SLIPS</button>
            <button class="menu-btn master-btn" onclick="showView('update')">MANAGE EMPLOYEES</button>
            <button class="main-btn btn-red" onclick="location.reload()" style="grid-column: span 2;">LOGOUT</button>
        </div>
    </div>

    <div id="listPage" class="container hidden">
        <h2 id="listTitle">Employee Records</h2>
        <div style="overflow-x:auto;">
            <table><thead id="tableHead"></thead><tbody id="empTableBody"></tbody></table>
        </div>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK TO DASHBOARD</button>
    </div>

    <div id="detailModal" class="modal hidden">
        <div class="detail-card">
            <h2 style="border-bottom: 3px solid #000;">Employee Profile</h2>
            <div id="detailContent"></div>
            <button class="main-btn btn-red" onclick="closeDetails()">CLOSE</button>
        </div>
    </div>

    <div id="addPage" class="container hidden">
        <h2>Add New Employee</h2>
        <input type="text" id="newEmpId" placeholder="Employee ID">
        <input type="text" id="newEmpName" placeholder="Full Name">
        <input type="text" id="newEmpPhone" placeholder="Phone Number">
        <input type="text" id="newEmpBank" placeholder="Bank Name">
        <input type="text" id="newEmpAcc" placeholder="Account Number / IBAN">
        <select id="newEmpStatus"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
        <button class="main-btn btn-green" onclick="saveNewEmployee()">SAVE EMPLOYEE</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="salaryPage" class="container hidden"><h2>Salary Calc</h2><button onclick="navTo('dashboardPage')">Back</button></div>
    <div id="reportPage" class="container hidden"><h2>Reports</h2><button onclick="navTo('dashboardPage')">Back</button></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDrzmh9TbcyuLAG6LkoKERcBuHvQ-sf0oU",
            authDomain: "my-hrm-project-d1aef.firebaseapp.com",
            projectId: "my-hrm-project-d1aef",
            storageBucket: "my-hrm-project-d1aef.appspot.com",
            messagingSenderId: "165053525844",
            appId: "1:165053525844:web:6abc82aca238d9e84862c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // لاگ ان فنکشن
        function handleLogin() {
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            
            if (u === "Meskay" && p === "Pakistan786") {
                navTo('dashboardPage');
                updateCounts();
            } else {
                alert("غلط معلومات! دوبارہ کوشش کریں۔");
            }
        }

        // پیج نیویگیشن (صرف متعلقہ پیج دکھانے کے لیے)
        function navTo(id) {
            const sections = ['loginPage', 'dashboardPage', 'listPage', 'addPage', 'salaryPage', 'reportPage'];
            sections.forEach(s => {
                const el = document.getElementById(s);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        async function updateCounts() {
            const snap = await db.collection("employees").get();
            let all = 0, act = 0;
            snap.forEach(doc => { all++; if(doc.data().status === 'Active') act++; });
            document.getElementById("cntAll").innerText = all;
            document.getElementById("cntActive").innerText = act;
        }

        async function showView(mode) {
            navTo('listPage');
            const b = document.getElementById("empTableBody");
            b.innerHTML = "<tr><td colspan='5'>لوڈنگ ہو رہی ہے...</td></tr>";
            
            const isUpdate = mode === 'update';
            document.getElementById("tableHead").innerHTML = `<tr><th>ID</th><th>Name</th><th>Status</th><th>Details</th>${isUpdate ? '<th>Actions</th>' : ''}</tr>`;
            
            const snap = await db.collection("employees").get();
            b.innerHTML = "";
            
            snap.forEach(doc => {
                const e = doc.data();
                if(mode === 'all' || e.status === mode || isUpdate) {
                    let actionBtn = isUpdate ? `<td><button onclick="toggleStatus('${doc.id}', '${e.status === 'Active' ? 'Inactive' : 'Active'}')" style="background:#ff9800; color:white; border:none; padding:5px; border-radius:3px;">تبدیل کریں</button></td>` : "";
                    
                    b.innerHTML += `<tr>
                        <td>${e.id}</td>
                        <td>${e.name}</td>
                        <td style="color:${e.status === 'Active' ? 'green' : 'red'}; font-weight:bold;">${e.status}</td>
                        <td><button class="btn-blue" style="padding:5px 10px; cursor:pointer;" onclick="viewEmpDetails('${doc.id}')">View 👁️</button></td>
                        ${actionBtn}
                    </tr>`;
                }
            });
        }

        async function viewEmpDetails(docId) {
            const doc = await db.collection("employees").doc(docId).get();
            const e = doc.data();
            document.getElementById("detailContent").innerHTML = `
                <div class="detail-row"><strong>ID:</strong> ${e.id}</div>
                <div class="detail-row"><strong>نام:</strong> ${e.name}</div>
                <div class="detail-row"><strong>فون:</strong> ${e.phone || '-'}</div>
                <div class="detail-row"><strong>بینک:</strong> ${e.bank || '-'}</div>
                <div class="detail-row"><strong>اکاؤنٹ نمبر:</strong> ${e.acc || '-'}</div>
                <div class="detail-row"><strong>اسٹیٹس:</strong> ${e.status}</div>
            `;
            document.getElementById("detailModal").classList.remove("hidden");
        }

        function closeDetails() { document.getElementById("detailModal").classList.add("hidden"); }

        async function saveNewEmployee() {
            const id = document.getElementById("newEmpId").value;
            const name = document.getElementById("newEmpName").value;
            if(!id || !name) return alert("آئی ڈی اور نام ضروری ہے!");
            await db.collection("employees").add({
                id, name, 
                phone: document.getElementById("newEmpPhone").value,
                bank: document.getElementById("newEmpBank").value,
                acc: document.getElementById("newEmpAcc").value,
                status: document.getElementById("newEmpStatus").value
            });
            alert("ملازم شامل کر دیا گیا!"); navTo('dashboardPage'); updateCounts();
        }
    </script>
</body>
</html>
