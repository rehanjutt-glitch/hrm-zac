<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM MASTER - SMART MONTH CALC</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-align: center; color: #333; }
        .container { width: 95%; max-width: 900px; margin: 20px auto; background: #fff; padding: 25px; border: 3px solid #000; box-shadow: 10px 10px 0 #000; border-radius: 8px; }
        .hidden { display: none; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #000; font-size: 16px; box-sizing: border-box; font-weight: bold; }
        .main-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 25px 10px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .badge { display: block; font-size: 24px; color: #ffeb3b; margin-top: 8px; }
        
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .profile-trigger { display: flex; align-items: center; cursor: pointer; background: #000; color: #fff; padding: 8px 15px; border: 2px solid #000; }
        
        .calc-info { background: #e3f2fd; padding: 15px; border: 2px dashed #000; margin: 10px 0; font-weight: bold; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 10px; }
        .type-selector button { flex: 1; padding: 10px; cursor: pointer; border: 2px solid #000; font-weight: bold; }
        .active-type { background: #000; color: #fff; }

        .slip-card { border: 2px solid #000; padding: 30px; margin: 20px auto; width: 85%; background: #fff; text-align: left; }
        .sig-container { display: flex; justify-content: space-between; margin-top: 50px; }
        .sig-box { border-top: 2px solid #000; width: 40%; text-align: center; padding-top: 5px; font-weight: bold; }

        @media print {
            .no-print { display: none; }
            .slip-card { page-break-after: always; width: 100%; border: 1px solid #000; }
        }
    </style>
</head>
<body>

    <div id="loginPage" class="container">
        <h1>MESKAY HRM</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="main-btn" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <div class="top-bar">
            <div class="profile-trigger" onclick="location.reload()">
                <span>Logout</span>
            </div>
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="showView('all')">ALL STAFF <span class="badge" id="cntAll">0</span></button>
            <button class="menu-btn" onclick="showView('Active')">ACTIVE <span class="badge" id="cntActive">0</span></button>
            <button class="menu-btn" onclick="navTo('addPage')">ADD NEW</button>
            <button class="menu-btn" onclick="navTo('salaryPage')" style="background:#2e7d32; grid-column:span 2;">SALARY CALCULATOR</button>
            <button class="menu-btn" onclick="navTo('reportPage')" style="background:#01579b; grid-column:span 2;">REPORTS & SLIPS</button>
        </div>
    </div>

    <div id="addPage" class="container hidden">
        <h2>Add Employee</h2>
        <input type="text" id="newEmpId" placeholder="ID">
        <input type="text" id="newEmpName" placeholder="Full Name">
        <button class="main-btn btn-green" onclick="saveNewEmployee()">SAVE</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="salaryPage" class="container hidden">
        <h2>Smart Salary Calculator</h2>
        <select id="salEmpList"></select>
        
        <div class="type-selector">
            <button id="btnMonthly" class="active-type" onclick="setCalcMode('monthly')">Monthly Fix</button>
            <button id="btnDaily" onclick="setCalcMode('daily')">Daily Wages</button>
        </div>

        <label>Start Date:</label><input type="date" id="startDate" onchange="autoCalc()">
        <label>End Date:</label><input type="date" id="endDate" onchange="autoCalc()">
        
        <div class="calc-info">
            Days Worked: <span id="displayDays">0</span><br>
            <small id="monthInfo" style="color: blue;"></small>
        </div>
        
        <input type="number" id="baseAmount" placeholder="Enter Amount" onkeyup="autoCalc()">
        
        <div class="calc-info" style="background:#c8e6c9">Total Amount: <span id="displayTotal">0</span></div>
        
        <button class="main-btn btn-green" onclick="saveSalary()">SAVE RECORD</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="reportPage" class="container hidden">
        <div class="no-print">
            <h2>Reports</h2>
            <input type="month" id="repMonth">
            <button class="main-btn btn-green" onclick="generateReport()">VIEW</button>
            <button class="main-btn" onclick="window.print()">PRINT</button>
            <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
        </div>
        <div id="printArea"></div>
    </div>

    <div id="listPage" class="container hidden">
        <h2>Staff List</h2>
        <table id="empTable" border="1" width="100%"><thead><tr><th>ID</th><th>Name</th></tr></thead><tbody id="empTableBody"></tbody></table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDrzmh9TbcyuLAG6LkoKERcBuHvQ-sf0oU",
            authDomain: "my-hrm-project-d1aef.firebaseapp.com",
            projectId: "my-hrm-project-d1aef",
            storageBucket: "my-hrm-project-d1aef.appspot.com",
            messagingSenderId: "165053525844",
            appId: "1:165053525844:web:6abc82aca238d9e84862c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let calcMode = 'monthly';

        function handleLogin() {
            if(document.getElementById("username").value === "Meskay" && document.getElementById("password").value === "Pakistan786") {
                navTo('dashboardPage');
            } else alert("Wrong!");
        }

        function navTo(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'dashboardPage') updateCounts();
            if(id === 'salaryPage') loadSalEmps();
        }

        function setCalcMode(mode) {
            calcMode = mode;
            document.getElementById("btnMonthly").className = mode === 'monthly' ? 'active-type' : '';
            document.getElementById("btnDaily").className = mode === 'daily' ? 'active-type' : '';
            autoCalc();
        }

        // SMART CALCULATION LOGIC
        function autoCalc() {
            const startVal = document.getElementById("startDate").value;
            const endVal = document.getElementById("endDate").value;
            const amount = parseFloat(document.getElementById("baseAmount").value) || 0;

            if (startVal && endVal) {
                const start = new Date(startVal);
                const end = new Date(endVal);
                
                // 1. Calculate Days Worked
                const diffTime = Math.abs(end - start);
                const daysWorked = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById("displayDays").innerText = daysWorked;

                // 2. Get Days in Current Month (Based on End Date)
                const year = end.getFullYear();
                const month = end.getMonth() + 1; 
                const daysInMonth = new Date(year, month, 0).getDate(); // Magic line to get total days in month
                
                document.getElementById("monthInfo").innerText = calcMode === 'monthly' ? `(Dividing by ${daysInMonth} days for this month)` : "";

                let total = 0;
                if(calcMode === 'monthly') {
                    // Formula: (Monthly Salary / Actual Days in Month) * Days Worked
                    total = Math.round((amount / daysInMonth) * daysWorked);
                } else {
                    total = amount * daysWorked;
                }
                document.getElementById("displayTotal").innerText = total;
            }
        }

        async function saveSalary() {
            const n = document.getElementById("salEmpList").options[document.getElementById("salEmpList").selectedIndex].text;
            await db.collection("salaries").add({
                empName: n, total: document.getElementById("displayTotal").innerText,
                days: document.getElementById("displayDays").innerText,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                dateKey: document.getElementById("endDate").value.substring(0,7)
            });
            alert("Saved!"); navTo('dashboardPage');
        }

        async function updateCounts() {
            const snap = await db.collection("employees").get();
            document.getElementById("cntAll").innerText = snap.size;
            document.getElementById("cntActive").innerText = snap.size; // Simplified
        }

        async function loadSalEmps() {
            const sel = document.getElementById("salEmpList");
            sel.innerHTML = "";
            const snap = await db.collection("employees").get();
            snap.forEach(doc => sel.innerHTML += `<option>${doc.data().name}</option>`);
        }

        async function saveNewEmployee() {
            await db.collection("employees").add({ id: document.getElementById("newEmpId").value, name: document.getElementById("newEmpName").value });
            alert("Added!"); navTo('dashboardPage');
        }

        async function generateReport() {
            const m = document.getElementById("repMonth").value;
            const area = document.getElementById("printArea");
            const snap = await db.collection("salaries").where("dateKey", "==", m).get();
            area.innerHTML = "";
            snap.forEach(doc => {
                const s = doc.data();
                area.innerHTML += `<div class="slip-card">
                    <h2 style="text-align:center">MESKAY & FEMTEE</h2>
                    <p>Name: ${s.empName}</p><p>Days: ${s.days}</p><p>Period: ${s.startDate} to ${s.endDate}</p>
                    <hr><h3>NET PAY: ${s.total}</h3>
                    <div class="sig-container"><div class="sig-box">Prepared By</div><div class="sig-box">Receiving</div></div>
                </div>`;
            });
        }

        async function showView() {
            navTo('listPage');
            const b = document.getElementById("empTableBody"); b.innerHTML = "";
            const snap = await db.collection("employees").get();
            snap.forEach(doc => b.innerHTML += `<tr><td>${doc.data().id}</td><td>${doc.data().name}</td></tr>`);
        }
    </script>
</body>
</html>
