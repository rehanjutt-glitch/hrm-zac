<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM MASTER - USER CONTROL</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-align: center; color: #333; }
        .container { width: 95%; max-width: 900px; margin: 20px auto; background: #fff; padding: 25px; border: 3px solid #000; box-shadow: 10px 10px 0 #000; border-radius: 8px; }
        .hidden { display: none; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #000; font-size: 16px; box-sizing: border-box; font-weight: bold; }
        .main-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }

        .pass-box { position: relative; }
        .eye-icon { position: absolute; right: 15px; top: 25px; cursor: pointer; font-size: 20px; z-index: 10; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 25px 10px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; position: relative; border-radius: 5px; }
        .badge { display: block; font-size: 24px; color: #ffeb3b; margin-top: 8px; }
        .master-btn { grid-column: span 2; background: #1a237e; }
        
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; position: relative; }
        .profile-trigger { display: flex; align-items: center; cursor: pointer; background: #000; color: #fff; padding: 8px 15px; border: 2px solid #000; }
        .nav-img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; border: 1px solid #fff; object-fit: cover; }
        .dropdown-menu { position: absolute; top: 100%; right: 0; background: #fff; border: 3px solid #000; width: 220px; z-index: 1000; padding: 15px; box-shadow: 5px 5px 0 #000; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 2px solid #000; padding: 12px; text-align: center; }
        th { background: #eee; }

        .calc-info { background: #e3f2fd; padding: 15px; border: 2px dashed #000; margin: 10px 0; font-weight: bold; }
        
        .type-selector { display: flex; gap: 10px; margin: 10px 0; }
        .type-selector button { flex: 1; padding: 12px; border: 2px solid #000; cursor: pointer; font-weight: bold; background: #fff; }
        .active-type { background: #000 !important; color: #fff !important; }

        .slip-card { border: 2px solid #000; padding: 30px; margin: 20px auto; width: 85%; background: #fff; text-align: left; border-radius: 5px; }
        .sig-container { display: flex; justify-content: space-between; margin-top: 50px; }
        .sig-box { border-top: 2px solid #000; width: 40%; text-align: center; padding-top: 5px; font-weight: bold; }

        .access-box { text-align: left; background: #f9f9f9; padding: 10px; border: 1px solid #000; margin-bottom: 10px; }
        .access-box label { display: block; margin: 5px 0; cursor: pointer; }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            .slip-card { page-break-after: auto; width: 100%; margin: 0; border: 1px solid #000; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loginPage" class="container">
        <h1>HRM CLOUD</h1>
        <p>Please Login To Access Our Dasboard</p>
        <input type="text" id="username" placeholder="Username / Login ID">
        <div class="pass-box">
            <input type="password" id="password" placeholder="Password">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
        </div>
        <button class="main-btn" onclick="handleLogin()">CLICK HERE TO LOGIN </button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <div class="top-bar">
            <div class="profile-trigger" onclick="toggleMenu()">
                <img id="navPic" src="https://via.placeholder.com/40" class="nav-img">
                <span id="navName">Admin</span>
            </div>
            <div id="profileMenu" class="dropdown-menu hidden">
                <input type="password" id="oldPass" placeholder="پرانا پاسورڈ">
    <input type="text" id="newUsername" placeholder="نیا یوزر نیم">
    <input type="password" id="newPass" placeholder="نیا پاسورڈ">
    <button onclick="updateCredentials()" style="background-color: #e67e22; color: white;">تبدیل کریں</button>
</div>

<button onclick="document.getElementById('settingsSection').style.display='block'">اکاؤنٹ سیٹنگز</button>
                <button class="main-btn btn-red" onclick="location.reload()">🚪 Logout</button>
            </div>
        </div>

        <div class="menu-grid" id="mainMenuGrid">
            <button class="menu-btn" data-access="view" onclick="showView('all')">TOTAL STAFF <span class="badge" id="cntAll">0</span></button>
            <button class="menu-btn" data-access="view" onclick="showView('Active')">ACTIVE STAFF <span class="badge" id="cntActive">0</span></button>
            <button class="menu-btn" data-access="view" onclick="showView('Inactive')">INACTIVE STAFF <span class="badge" id="cntInactive">0</span></button>
            <button class="menu-btn" data-access="add" onclick="navTo('addPage')">ADD NEW STAFF</button>
            <button class="menu-btn master-btn" data-access="salary" onclick="navTo('salaryPage')" style="background:#2e7d32">SALARY CALCULATOR</button>
            <button class="menu-btn master-btn" data-access="reports" onclick="navTo('reportPage')" style="background:#01579b">REPORTS & SLIPS</button>
            <button class="menu-btn master-btn" data-access="edit" onclick="showView('update')">MANAGE STAFF</button>
            <button class="menu-btn master-btn hidden" id="adminOnlyBtn" onclick="navTo('userAdminPage')" style="background:#d84315">USER MANAGEMENT (ADMIN)</button>
        </div>
    </div>

    <div id="userAdminPage" class="container hidden">
        <h2>Admin Panel: Manage Users</h2>
        <div style="border: 2px solid #000; padding: 15px; margin-bottom: 20px;">
            <h3>Create New User / Manager</h3>
            <input type="text" id="newFullNm" placeholder="Full Name (e.g. Asad Ali)">
            <input type="text" id="newUserNm" placeholder="Username (Login ID)">
            <input type="password" id="newUserPs" placeholder="Password">
            
            <div class="access-box">
                <strong>Set Access Permissions:</strong>
                <label><input type="checkbox" class="acc-check" value="view" checked> View Dashboard/Stats</label>
                <label><input type="checkbox" class="acc-check" value="add"> Add New Employees</label>
                <label><input type="checkbox" class="acc-check" value="edit"> Edit/Delete Employees</label>
                <label><input type="checkbox" class="acc-check" value="salary"> Salary Calculator</label>
                <label><input type="checkbox" class="acc-check" value="reports"> Reports & Slips</label>
            </div>
            
            <button class="main-btn btn-green" onclick="createNewUser()">CREATE USER</button>
        </div>
        
        <div style="overflow-x:auto;">
            <table id="userTable">
                <thead><tr><th>Name</th><th>User ID</th><th>Access</th><th>Action</th></tr></thead>
                <tbody id="userListBody"></tbody>
            </table>
        </div>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="editPage" class="container hidden">
        <h2>Edit Employee Details</h2>
        <input type="hidden" id="editDocId">
        <label>Employee ID:</label>
        <input type="text" id="editEmpId">
        <label>Full Name:</label>
        <input type="text" id="editEmpName">
        <label>Phone Number:</label>
        <input type="text" id="editEmpPhone">
        <label>Bank Name:</label>
        <input type="text" id="editEmpBank">
        <label>Account / IBAN:</label>
        <input type="text" id="editEmpAcc">
        <label>Status:</label>
        <select id="editEmpStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
        </select>
        <button class="main-btn btn-green" onclick="updateEmployeeData()">UPDATE DETAILS</button>
        <button class="main-btn" onclick="showView('update')">CANCEL</button>
    </div>

    <div id="addPage" class="container hidden">
        <h2>Add New Employee</h2>
        <input type="text" id="newEmpId" placeholder="Employee ID (e.g. 101)">
        <input type="text" id="newEmpName" placeholder="Full Name">
        <input type="text" id="newEmpPhone" placeholder="Phone Number">
        <input type="text" id="newEmpBank" placeholder="Bank Name (Optional)">
        <input type="text" id="newEmpAcc" placeholder="Account Number / IBAN (Optional)">
        <select id="newEmpStatus"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
        <button class="main-btn btn-green" onclick="saveNewEmployee()">SAVE EMPLOYEE</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="salaryPage" class="container hidden">
        <h2>Salary Calculator</h2>
        <select id="salEmpList"></select>
        <div class="type-selector">
            <button id="btnMonthly" class="active-type" onclick="setCalcMode('monthly')">Monthly Fix</button>
            <button id="btnDaily" onclick="setCalcMode('daily')">Daily Wages</button>
        </div>
        <label>From:</label><input type="date" id="startDate" onchange="autoCalc()">
        <label>To:</label><input type="date" id="endDate" onchange="autoCalc()">
        <div class="calc-info">Days Worked: <span id="displayDays">0</span> <small id="monthInfo" style="display:block; color:blue;"></small></div>
        <input type="number" id="baseAmount" placeholder="Enter Amount" onkeyup="autoCalc()">
        <div class="calc-info" style="background:#c8e6c9">Total Payable: <span id="displayTotal">0</span></div>
        <button class="main-btn btn-green" onclick="saveSalary()">SAVE TO CLOUD</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="reportPage" class="container hidden">
        <div class="no-print">
            <h2>Reports & Slips</h2>
            <div style="display: flex; gap: 10px;">
                <input type="month" id="repMonth">
                <select id="repEmpList"><option value="all">-- Full Staff --</option></select>
            </div>
            <button class="main-btn btn-green" onclick="generateReport()">GENERATE REPORT</button>
            <button class="main-btn" onclick="window.print()">PRINT SLIPS</button>
            <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
        </div>
        <div id="printArea"></div>
    </div>

    <div id="listPage" class="container hidden">
        <h2 id="listTitle">Employee Records</h2>
        <div style="overflow-x:auto;">
            <table><thead id="tableHead"></thead><tbody id="empTableBody"></tbody></table>
        </div>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDrzmh9TbcyuLAG6LkoKERcBuHvQ-sf0oU",
            authDomain: "my-hrm-project-d1aef.firebaseapp.com",
            projectId: "my-hrm-project-d1aef",
            storageBucket: "my-hrm-project-d1aef.appspot.com",
            messagingSenderId: "165053525844",
            appId: "1:165053525844:web:6abc82aca238d9e84862c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let calcMode = 'monthly';

        async function handleLogin() {
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();

            // Master Admin Check
            if (u === "Meskay" && p === "Pakistan786") {
                currentUser = { name: "Admin", role: "admin", access: ['view', 'add', 'edit', 'salary', 'reports'] };
                return loginOk();
            }

            // Check Users from DB
            const userSnap = await db.collection("users").where("username", "==", u).where("password", "==", p).get();
            if (!userSnap.empty) {
                const userData = userSnap.docs[0].data();
                currentUser = { name: userData.fullName, role: "user", access: userData.permissions };
                return loginOk();
            }

            alert("Invalid Credentials!");
        }

        function loginOk() {
            document.getElementById("navName").innerText = currentUser.name;
            applyPermissions();
            navTo('dashboardPage');
        }

        function applyPermissions() {
            const btns = document.querySelectorAll('.menu-btn');
            btns.forEach(btn => {
                const req = btn.getAttribute('data-access');
                if (req && !currentUser.access.includes(req)) {
                    btn.classList.add('hidden');
                } else {
                    btn.classList.remove('hidden');
                }
            });

            // Admin only button visibility
            if (currentUser.role === 'admin') {
                document.getElementById("adminOnlyBtn").classList.remove('hidden');
            } else {
                document.getElementById("adminOnlyBtn").classList.add('hidden');
            }
        }

        async function createNewUser() {
            const fn = document.getElementById("newFullNm").value;
            const un = document.getElementById("newUserNm").value;
            const up = document.getElementById("newUserPs").value;
            const perms = Array.from(document.querySelectorAll('.acc-check:checked')).map(cb => cb.value);

            if(!fn || !un || !up) return alert("All fields are required!");

            await db.collection("users").add({
                fullName: fn,
                username: un,
                password: up,
                permissions: perms
            });
            alert("User Created!");
            loadUsers();
        }

        async function loadUsers() {
            const body = document.getElementById("userListBody");
            body.innerHTML = "Loading...";
            const snap = await db.collection("users").get();
            body.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                body.innerHTML += `<tr>
                    <td>${d.fullName}</td>
                    <td>${d.username}</td>
                    <td><small>${d.permissions.join(', ')}</small></td>
                    <td><button class="btn-red" style="padding:5px;" onclick="deleteUser('${doc.id}')">Delete</button></td>
                </tr>`;
            });
        }

        async function deleteUser(id) {
            if(confirm("Delete this user?")) {
                await db.collection("users").doc(id).delete();
                loadUsers();
            }
        }

        function navTo(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'dashboardPage') updateCounts();
            if(id === 'salaryPage' || id === 'reportPage') loadEmpDropdowns();
            if(id === 'userAdminPage') loadUsers();
        }

        // --- All your original functions remain exactly the same below ---

        function togglePass() {
            const p = document.getElementById("password");
            p.type = p.type === "password" ? "text" : "password";
        }

        function toggleMenu() { document.getElementById("profileMenu").classList.toggle("hidden"); }

        function setCalcMode(mode) {
            calcMode = mode;
            document.getElementById("btnMonthly").classList.toggle("active-type", mode === 'monthly');
            document.getElementById("btnDaily").classList.toggle("active-type", mode === 'daily');
            document.getElementById("baseAmount").placeholder = mode === 'monthly' ? "Monthly Fix Salary" : "Daily Wage Rate";
            autoCalc();
        }

        function autoCalc() {
            const sVal = document.getElementById("startDate").value;
            const eVal = document.getElementById("endDate").value;
            const amount = parseFloat(document.getElementById("baseAmount").value) || 0;
            if (sVal && eVal) {
                const s = new Date(sVal);
                const e = new Date(eVal);
                const days = Math.ceil(Math.abs(e - s) / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById("displayDays").innerText = days;
                if (calcMode === 'monthly') {
                    const daysInMonth = new Date(e.getFullYear(), e.getMonth() + 1, 0).getDate();
                    document.getElementById("monthInfo").innerText = `(Dividing by ${daysInMonth} days)`;
                    document.getElementById("displayTotal").innerText = Math.round((amount / daysInMonth) * days);
                } else {
                    document.getElementById("monthInfo").innerText = "";
                    document.getElementById("displayTotal").innerText = amount * days;
                }
            }
        }

        async function updateCounts() {
            const snap = await db.collection("employees").get();
            let all = 0, act = 0, inact = 0;
            snap.forEach(doc => { 
                all++; 
                if(doc.data().status === 'Active') act++; 
                else inact++;
            });
            document.getElementById("cntAll").innerText = all;
            document.getElementById("cntActive").innerText = act;
            document.getElementById("cntInactive").innerText = inact;
        }

        async function loadEmpDropdowns() {
            const salSel = document.getElementById("salEmpList");
            const repSel = document.getElementById("repEmpList");
            salSel.innerHTML = "";
            repSel.innerHTML = '<option value="all">-- Full Staff --</option>';
            const snap = await db.collection("employees").where("status","==","Active").get();
            snap.forEach(doc => {
                const data = doc.data();
                salSel.innerHTML += `<option value="${doc.id}">${data.name} (${data.id})</option>`;
                repSel.innerHTML += `<option value="${data.name}">${data.name}</option>`;
            });
        }

        async function saveSalary() {
            const empRefId = document.getElementById("salEmpList").value;
            const empSnap = await db.collection("employees").doc(empRefId).get();
            const empData = empSnap.data();
            const t = document.getElementById("displayTotal").innerText;
            if(t == "0") return alert("Calculate first!");
            await db.collection("salaries").add({
                empName: empData.name,
                empId: empData.id,
                phone: empData.phone || 'N/A',
                bank: empData.bank || '',
                acc: empData.acc || '',
                total: t,
                days: document.getElementById("displayDays").innerText,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                dateKey: document.getElementById("endDate").value.substring(0,7)
            });
            alert("Salary Saved!"); navTo('dashboardPage');
        }

        async function generateReport() {
            const m = document.getElementById("repMonth").value;
            const selectedEmp = document.getElementById("repEmpList").value;
            const area = document.getElementById("printArea");
            if (!m) return alert("Please select a month first!");
            let query = db.collection("salaries").where("dateKey", "==", m);
            if (selectedEmp !== "all") query = query.where("empName", "==", selectedEmp);
            const snap = await query.get();
            area.innerHTML = snap.empty ? "<h3>No Records Found</h3>" : "";
            if (snap.empty) return;
            if (selectedEmp === "all") {
                let tableHtml = `<div class="slip-card" style="width:95%; border:none;"><h2 style="text-align:center; border-bottom:3px solid #000; padding-bottom:10px;">MESKAY & FEMTEE - STAFF SALARY LIST (${m})</h2><table style="width:100%; margin-top:10px;"><thead><tr style="background:#eee;"><th style="width:12%;">ID No</th><th>Employee Name</th><th>Days</th><th>Salary Amount</th><th>Receiving Sign</th></tr></thead><tbody>`;
                let grandTotal = 0;
                snap.forEach(doc => {
                    const s = doc.data(); grandTotal += parseInt(s.total);
                    tableHtml += `<tr><td style="font-weight:bold;">${s.empId || '-'}</td><td style="text-align:left; padding-left:10px;">${s.empName}</td><td>${s.days}</td><td style="font-weight:bold;">${s.total} PKR</td><td style="height:45px; border: 2px solid #000;"></td></tr>`;
                });
                tableHtml += `<tr style="background:#f9f9f9; font-weight:bold;"><td colspan="3" style="text-align:right;">GRAND TOTAL:</td><td>${grandTotal} PKR</td><td></td></tr></tbody></table><div class="sig-container" style="margin-top:30px;"><div class="sig-box">Verified By (Admin)</div><div class="sig-box">Manager/Authorized Signature</div></div></div>`;
                area.innerHTML = tableHtml;
            } else {
                snap.forEach(doc => {
                    const s = doc.data();
                    let bankInfo = (s.bank || s.acc) ? `<p><strong>Bank:</strong> ${s.bank} | <strong>A/C:</strong> ${s.acc}</p>` : '';
                    area.innerHTML += `<div class="slip-card"><div style="text-align:center; border-bottom:2px solid #000; margin-bottom:10px;"><h2 style="margin:5px;">MESKAY & FEMTEE</h2><p style="margin:5px;">Monthly Salary Slip</p></div><p><strong>Employee ID:</strong> <span style="font-size:1.3em; font-weight:bold; background:#eee; padding:2px 8px; border:1px solid #000;">${s.empId || '-'}</span></p><p><strong>Full Name:</strong> ${s.empName}</p><p><strong>Phone:</strong> ${s.phone}</p>${bankInfo}<p><strong>Period:</strong> ${s.startDate} to ${s.endDate} (${s.days} Days)</p><div style="background:#eee; padding:12px; border:2px solid #000; margin-top:10px;"><h3 style="margin:0; text-align:center;">NET PAYABLE: ${s.total} PKR</h3></div><div class="sig-container"><div class="sig-box">Prepared By (Admin)</div><div class="sig-box">Employee Signature</div></div></div>`;
                });
            }
        }

        async function showView(mode) {
            navTo('listPage');
            const b = document.getElementById("empTableBody"); b.innerHTML = "";
            const isUpdate = mode === 'update';
            if(mode === 'Inactive') document.getElementById("listTitle").innerText = "Inactive Staff Records";
            else if(mode === 'Active') document.getElementById("listTitle").innerText = "Active Staff Records";
            else document.getElementById("listTitle").innerText = "Employee Records";
            document.getElementById("tableHead").innerHTML = `<tr><th>ID</th><th>Name</th><th>Phone</th><th>Status</th>${isUpdate ? '<th>Actions</th>' : ''}</tr>`;
            const snap = await db.collection("employees").get();
            snap.forEach(doc => {
                const e = doc.data(); const docId = doc.id;
                if(mode === 'all' || e.status === mode || isUpdate) {
                    let actionBtn = "";
                    if(isUpdate) {
                        actionBtn = `<td><button onclick="editEmp('${docId}')" style="background:#2196f3; color:white; border:none; padding:5px 10px; cursor:pointer; margin-right:5px; border-radius:3px; font-weight:bold;">Edit</button><button onclick="delEmp('${docId}')" style="background:#dc3545; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:3px; font-weight:bold;">Delete</button></td>`;
                    }
                    const statusColor = e.status === 'Active' ? 'green' : 'red';
                    b.innerHTML += `<tr><td>${e.id}</td><td>${e.name}</td><td>${e.phone || '-'}</td><td style="color:${statusColor}; font-weight:bold;">${e.status}</td>${actionBtn}</tr>`;
                }
            });
        }

        async function editEmp(docId) {
            const doc = await db.collection("employees").doc(docId).get();
            const data = doc.data();
            document.getElementById("editDocId").value = docId;
            document.getElementById("editEmpId").value = data.id;
            document.getElementById("editEmpName").value = data.name;
            document.getElementById("editEmpPhone").value = data.phone || '';
            document.getElementById("editEmpBank").value = data.bank || '';
            document.getElementById("editEmpAcc").value = data.acc || '';
            document.getElementById("editEmpStatus").value = data.status;
            navTo('editPage');
        }

        async function updateEmployeeData() {
            const docId = document.getElementById("editDocId").value;
            const updatedData = {
                id: document.getElementById("editEmpId").value,
                name: document.getElementById("editEmpName").value,
                phone: document.getElementById("editEmpPhone").value,
                bank: document.getElementById("editEmpBank").value,
                acc: document.getElementById("editEmpAcc").value,
                status: document.getElementById("editEmpStatus").value
            };
            if(!updatedData.id || !updatedData.name) return alert("ID and Name are required!");
            await db.collection("employees").doc(docId).update(updatedData);
            alert("Employee Details Updated!"); showView('update');
        }

        async function delEmp(id) { if(confirm("Are you sure?")) { await db.collection("employees").doc(id).delete(); showView('update'); } }

        async function saveNewEmployee() {
            const id = document.getElementById("newEmpId").value;
            const name = document.getElementById("newEmpName").value;
            const phone = document.getElementById("newEmpPhone").value;
            const bank = document.getElementById("newEmpBank").value;
            const acc = document.getElementById("newEmpAcc").value;
            const status = document.getElementById("newEmpStatus").value;
            if(!id || !name) return alert("ID and Name are required!");
            await db.collection("employees").add({ id, name, phone, bank, acc, status });
            alert("Employee Added Successfully!"); navTo('dashboardPage');
        }
    </script>
</body>
</html>
