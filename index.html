<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM MASTER - FIXED</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-align: center; color: #333; }
        .container { width: 95%; max-width: 900px; margin: 20px auto; background: #fff; padding: 25px; border: 3px solid #000; box-shadow: 10px 10px 0 #000; border-radius: 8px; }
        .hidden { display: none; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #000; font-size: 16px; box-sizing: border-box; font-weight: bold; }
        .main-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }

        .pass-box { position: relative; }
        .eye-icon { position: absolute; right: 15px; top: 25px; cursor: pointer; font-size: 20px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 25px 10px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; position: relative; border-radius: 5px; }
        .badge { display: block; font-size: 24px; color: #ffeb3b; margin-top: 8px; }
        .master-btn { grid-column: span 2; background: #1a237e; }
        .sal-btn { background: #2e7d32; }
        .rep-btn { background: #01579b; }

        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; position: relative; }
        .profile-trigger { display: flex; align-items: center; cursor: pointer; background: #000; color: #fff; padding: 8px 15px; border: 2px solid #000; }
        .nav-img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; border: 1px solid #fff; object-fit: cover; }
        .dropdown-menu { position: absolute; top: 100%; right: 0; background: #fff; border: 3px solid #000; width: 220px; z-index: 1000; padding: 15px; box-shadow: 5px 5px 0 #000; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 2px solid #000; padding: 12px; text-align: center; }
        th { background: #eee; }
        .active-row { border-left: 10px solid green; }
        .inactive-row { border-left: 10px solid red; }

        .calc-info { background: #e3f2fd; padding: 15px; border: 2px dashed #000; margin: 10px 0; font-weight: bold; }

        @media print {
            .no-print { display: none; }
            .slip-card { page-break-after: always; border: 2px solid #000; padding: 30px; margin: 20px; text-align: left; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loginPage" class="container">
        <h1>HRM MASTER LOGIN</h1>
        <input type="text" id="username" placeholder="Username">
        <div class="pass-box">
            <input type="password" id="password" placeholder="Password">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
        </div>
        <button class="main-btn" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <div class="top-bar">
            <div class="profile-trigger" onclick="toggleMenu()">
                <img id="navPic" src="https://via.placeholder.com/40" class="nav-img">
                <span id="navName">User</span>
            </div>
            <div id="profileMenu" class="dropdown-menu hidden">
                <img id="menuPic" src="https://via.placeholder.com/60" style="border-radius:50%; border:2px solid #000"><br>
                <input type="file" id="picUpload" onchange="uploadImage()" hidden>
                <label for="picUpload" style="cursor:pointer; color:blue; text-decoration:underline; font-size:12px;">Change Photo</label>
                <hr>
                <button class="main-btn" onclick="navTo('adminPage')" id="adminBtn">⚙️ Admin Panel</button>
                <button class="main-btn btn-red" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="showView('all')">ALL EMPLOYEES <span class="badge" id="cntAll">0</span></button>
            <button class="menu-btn" onclick="showView('Active')">ACTIVE STAFF <span class="badge" id="cntActive">0</span></button>
            <button class="menu-btn" onclick="showView('Inactive')">INACTIVE STAFF <span class="badge" id="cntInactive">0</span></button>
            <button class="menu-btn" onclick="navTo('addPage')">ADD NEW EMPLOYEE</button>
            <button class="menu-btn master-btn" onclick="showView('update')">UPDATE & MANAGE INFO</button>
            <button class="menu-btn sal-btn" onclick="navTo('salaryPage')">SALARY CALCULATOR</button>
            <button class="menu-btn rep-btn" onclick="navTo('reportPage')">REPORTS & SLIPS</button>
        </div>
    </div>

    <div id="addPage" class="container hidden">
        <h2>Add New Employee</h2>
        <input type="text" id="newEmpId" placeholder="Employee ID (e.g. 101)">
        <input type="text" id="newEmpName" placeholder="Employee Full Name">
        <select id="newEmpStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
        </select>
        <button class="main-btn btn-green" onclick="saveNewEmployee()">SAVE EMPLOYEE</button>
        <button class="main-btn btn-red" onclick="navTo('dashboardPage')">CANCEL</button>
    </div>

    <div id="listPage" class="container hidden">
        <h2 id="listTitle">Records</h2>
        <table>
            <thead id="tableHead"></thead>
            <tbody id="empTableBody"></tbody>
        </table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="salaryPage" class="container hidden">
        <h2>Generate Salary</h2>
        <select id="salEmpList"></select>
        <label>Start Date:</label>
        <input type="date" id="startDate" onchange="autoCalcDays()">
        <label>End Date:</label>
        <input type="date" id="endDate" onchange="autoCalcDays()">
        <div class="calc-info">Days: <span id="displayDays">0</span></div>
        <input type="number" id="salWages" placeholder="Daily Rate" onkeyup="autoCalcDays()">
        <div class="calc-info" style="background:#c8e6c9">Total: <span id="displayTotal">0</span></div>
        <button class="main-btn btn-green" onclick="saveSalary()">SAVE SALARY</button>
        <button class="main-btn btn-red" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="reportPage" class="container hidden">
        <div class="no-print">
            <h2>Reports</h2>
            <input type="month" id="repMonth">
            <button class="main-btn btn-green" onclick="generateReport()">VIEW</button>
            <button class="main-btn" onclick="window.print()">PRINT</button>
            <button class="main-btn btn-red" onclick="navTo('dashboardPage')">BACK</button>
        </div>
        <div id="printArea"></div>
    </div>

    <div id="adminPage" class="container hidden">
        <h2>Admin Management</h2>
        <input type="text" id="newPersonName" placeholder="Full Name">
        <input type="text" id="newLoginName" placeholder="Username">
        <input type="text" id="newLoginPass" placeholder="Password">
        <select id="newRole">
            <option value="user">User</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
        </select>
        <button class="main-btn btn-green" onclick="createNewUser()">CREATE USER</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDrzmh9TbcyuLAG6LkoKERcBuHvQ-sf0oU",
            authDomain: "my-hrm-project-d1aef.firebaseapp.com",
            projectId: "my-hrm-project-d1aef",
            storageBucket: "my-hrm-project-d1aef.appspot.com",
            messagingSenderId: "165053525844",
            appId: "1:165053525844:web:6abc82aca238d9e84862c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;

        function navTo(id) {
            window.location.hash = id;
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'dashboardPage') updateCounts();
            if(id === 'salaryPage') loadSalEmps();
        }

        function togglePass() {
            const p = document.getElementById("password");
            p.type = (p.type === "password") ? "text" : "password";
        }

        // ADD NEW EMPLOYEE FUNCTION (FIXED)
        async function saveNewEmployee() {
            const id = document.getElementById("newEmpId").value.trim();
            const name = document.getElementById("newEmpName").value.trim();
            const status = document.getElementById("newEmpStatus").value;

            if(!id || !name) return alert("Please enter ID and Name!");

            try {
                await db.collection("employees").add({
                    id: id,
                    name: name,
                    status: status,
                    createdAt: new Date()
                });
                alert("Employee Added Successfully!");
                document.getElementById("newEmpId").value = "";
                document.getElementById("newEmpName").value = "";
                navTo('dashboardPage');
            } catch(e) { alert("Error saving data!"); }
        }

        function autoCalcDays() {
            const start = new Date(document.getElementById("startDate").value);
            const end = new Date(document.getElementById("endDate").value);
            const rate = document.getElementById("salWages").value || 0;
            if (start && end && end >= start) {
                const diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById("displayDays").innerText = diffDays;
                document.getElementById("displayTotal").innerText = diffDays * rate;
            } else {
                document.getElementById("displayDays").innerText = "0";
                document.getElementById("displayTotal").innerText = "0";
            }
        }

        async function handleLogin() {
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            if(u === "Meskay" && p === "Pakistan786") {
                currentUser = { name: "Master Admin", role: "admin", loginU: "Meskay" };
                loginOk(); return;
            }
            const snap = await db.collection("users").where("loginU","==",u).where("pass","==",p).get();
            if(!snap.empty) { currentUser = snap.docs[0].data(); loginOk(); } else alert("Access Denied!");
        }

        function loginOk() {
            document.getElementById("navName").innerText = currentUser.name;
            document.getElementById("adminBtn").style.display = (currentUser.role === 'admin') ? 'block' : 'none';
            navTo('dashboardPage');
            loadProfilePic();
        }

        async function updateCounts() {
            const snap = await db.collection("employees").get();
            let all = 0, act = 0, inact = 0;
            snap.forEach(doc => { all++; if(doc.data().status === 'Active') act++; else inact++; });
            document.getElementById("cntAll").innerText = all;
            document.getElementById("cntActive").innerText = act;
            document.getElementById("cntInactive").innerText = inact;
        }

        async function showView(mode) {
            navTo('listPage');
            const head = document.getElementById("tableHead");
            const body = document.getElementById("empTableBody");
            body.innerHTML = "Syncing...";
            head.innerHTML = `<tr><th>ID</th><th>Name</th><th>Status</th>${mode==='update'?'<th>Action</th>':''}</tr>`;
            
            let query = db.collection("employees");
            if(mode === 'Active' || mode === 'Inactive') query = query.where("status","==",mode);
            
            const snap = await query.get();
            body.innerHTML = "";
            snap.forEach(doc => {
                const e = doc.data();
                const actionCell = (mode === 'update') ? 
                    `<td><button class="btn-green" onclick="toggleStatus('${doc.id}','${e.status}')">Status</button> <button class="btn-red" onclick="delEmp('${doc.id}')">Delete</button></td>` : '';
                body.innerHTML += `<tr class="${e.status==='Active'?'active-row':'inactive-row'}"><td>${e.id}</td><td>${e.name}</td><td style="color:${e.status==='Active'?'green':'red'}; font-weight:bold">${e.status}</td>${actionCell}</tr>`;
            });
        }

        async function toggleStatus(id, s) {
            await db.collection("employees").doc(id).update({ status: s==='Active'?'Inactive':'Active' });
            showView('update');
        }

        async function delEmp(id) {
            if(confirm("Delete Employee?")) { await db.collection("employees").doc(id).delete(); showView('update'); }
        }

        async function loadSalEmps() {
            const sel = document.getElementById("salEmpList");
            sel.innerHTML = "";
            const snap = await db.collection("employees").where("status","==","Active").get();
            snap.forEach(doc => sel.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
        }

        async function saveSalary() {
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;
            const days = document.getElementById("displayDays").innerText;
            const total = document.getElementById("displayTotal").innerText;
            const rate = document.getElementById("salWages").value;
            if(!start || !end || days == "0") return alert("Check Dates!");
            await db.collection("salaries").add({
                empName: document.getElementById("salEmpList").options[document.getElementById("salEmpList").selectedIndex].text,
                startDate: start, endDate: end, total: total, days: days, rate: rate, dateKey: end.substring(0,7)
            });
            alert("Salary Saved!"); navTo('dashboardPage');
        }

        async function generateReport() {
            const month = document.getElementById("repMonth").value;
            const area = document.getElementById("printArea");
            const snap = await db.collection("salaries").where("dateKey","==",month).get();
            area.innerHTML = "";
            snap.forEach(doc => {
                const s = doc.data();
                area.innerHTML += `<div class="slip-card"><h2>SALARY SLIP</h2><p>Name: ${s.empName}</p><p>Period: ${s.startDate} to ${s.endDate}</p><hr><p>Days: ${s.days} | Rate: ${s.rate}</p><h3>TOTAL: ${s.total}</h3></div>`;
            });
        }

        async function uploadImage() {
            const file = document.getElementById("picUpload").files[0];
            await storage.ref('profiles/' + currentUser.loginU).put(file);
            loadProfilePic();
        }

        async function loadProfilePic() {
            try {
                const url = await storage.ref('profiles/' + currentUser.loginU).getDownloadURL();
                document.getElementById("navPic").src = url;
                document.getElementById("menuPic").src = url;
            } catch(e) {}
        }

        async function createNewUser() {
            const name = document.getElementById("newPersonName").value;
            const u = document.getElementById("newLoginName").value;
            const p = document.getElementById("newLoginPass").value;
            const r = document.getElementById("newRole").value;
            await db.collection("users").add({ name: name, loginU: u, pass: p, role: r });
            alert("User Created!"); navTo('dashboardPage');
        }

        function toggleMenu() { document.getElementById("profileMenu").classList.toggle("hidden"); }
        function logout() { location.reload(); }
    </script>
</body>
</html>
