<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM Cloud System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loginPage" class="container">
        <h1>HRM CLOUD LOGIN</h1>
        <input type="text" id="username" placeholder="USERNAME">
        <div style="position: relative;">
            <input type="password" id="password" placeholder="PASSWORD">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
        </div>
        <button class="main-btn" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <div class="admin-profile-wrapper">
            <div class="profile-trigger">👤 ACCOUNT</div>
            <div class="profile-menu">
                <h4 style="margin:0; border-bottom:1px solid #000;">SETTINGS</h4>
                <label>NEW NAME:</label>
                <input type="text" id="updName" placeholder="New Name">
                <label>NEW PASS:</label>
                <input type="password" id="updPass" placeholder="New Pass">
                <button class="action-btn" onclick="updateAdminProfile()">UPDATE</button>
                <button class="action-btn logout-btn" onclick="logout()">LOGOUT</button>
            </div>
        </div>
        <h2 id="welcomeText">WELCOME</h2>
        <div class="menu-grid">
            <button class="menu-btn" onclick="navTo('listPage')">ALL EMPLOYEES <span class="count-num" id="countAll">0</span></button>
            <button class="menu-btn" onclick="showFiltered('Active')">ACTIVE <span class="count-num" id="countActive">0</span></button>
            <button class="menu-btn" onclick="showFiltered('Inactive')">INACTIVE <span class="count-num" id="countInactive">0</span></button>
            <button id="btnAdd" class="menu-btn" onclick="navTo('addPage')">ADD NEW <span class="count-num">+</span></button>
            <button id="btnAdmin" class="menu-btn hidden" onclick="navTo('adminPage')" style="grid-column: span 2;">ADMIN PANEL</button>
        </div>
    </div>

    <div id="adminPage" class="container hidden">
        <h2>ADMIN - USER MANAGEMENT</h2>
        <input type="text" id="newU" placeholder="NEW USERNAME">
        <input type="text" id="newP" placeholder="NEW PASSWORD">
        <label><input type="checkbox" id="pAdd"> CAN ADD</label>
        <label><input type="checkbox" id="pDel"> CAN DELETE</label>
        <button class="main-btn" onclick="createNewUser()">SAVE USER</button>
        <table id="userTable">
            <thead><tr><th>NAME</th><th>ACTION</th></tr></thead>
            <tbody id="userListBody"></tbody>
        </table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="listPage" class="container hidden">
        <h2 id="listTitle">EMPLOYEE DATABASE</h2>
        <input type="text" onkeyup="searchEmp(this.value)" placeholder="SEARCH...">
        <table>
            <thead><tr><th>ID</th><th>NAME/STATUS</th><th>DESIG</th><th>PHONE</th><th>ACTION</th></tr></thead>
            <tbody id="empListBody"></tbody>
        </table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="addPage" class="container hidden">
        <h2>ADD NEW RECORD</h2>
        <input type="text" id="eId" placeholder="ID">
        <input type="text" id="eName" placeholder="NAME">
        <input type="text" id="eDes" placeholder="DESIGNATION">
        <input type="text" id="ePho" placeholder="PHONE">
        <button class="main-btn" onclick="saveEmployee()">SAVE TO CLOUD</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">CANCEL</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
