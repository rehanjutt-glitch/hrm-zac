<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM Cloud - Status & Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* بلیک اینڈ وائٹ پروفیشنل تھیم */
        body { background-color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; color: #000000; }
        .container { width: 95%; max-width: 900px; margin: 30px auto; padding: 25px; border: 2px solid #000000; text-align: center; }
        .hidden { display: none !important; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #000000; box-sizing: border-box; font-size: 16px; text-align: center; }
        .main-btn { width: 100%; padding: 15px; background: #000000; color: #ffffff; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .main-btn:hover { background: #333333; }
        
        /* ڈیش بورڈ بٹنز جن پر نمبر نظر آئیں گے */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 20px; background: #000000; color: #ffffff; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 13px; line-height: 1.6; }
        .count-num { font-size: 24px; display: block; margin-top: 5px; border-top: 1px solid #fff; padding-top: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #000000; padding: 10px; text-align: center; }
        th { background: #000000; color: #ffffff; }

        .status-tag { font-size: 11px; font-weight: bold; padding: 2px 5px; border: 1px solid #000; }
        .active-row { background: #ffffff; }
        .inactive-row { background: #f2f2f2; color: #777; }
        
        .action-btn { background: #000; color: #fff; border: none; padding: 5px 10px; cursor: pointer; font-size: 11px; margin: 2px; }
        .eye-icon { position: absolute; right: 15px; top: 25px; cursor: pointer; color: #000000; }
    </style>
</head>
<div id="profileModal" class="container hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100; background:white;">
    <h3>UPDATE PROFILE</h3>
    <input type="text" id="updName" placeholder="NEW USERNAME">
    <input type="password" id="updPass" placeholder="NEW PASSWORD">
    <button class="main-btn" onclick="updateCloudProfile()">UPDATE NOW</button>
    <button onclick="navTo('dashboardPage')">CLOSE</button>
</div>
    <body>


    <div id="loginPage" class="container">
        <h1>HRM CLOUD LOGIN</h1>
        <input type="text" id="username" placeholder="USERNAME">
        <div style="position: relative;">
            <input type="password" id="password" placeholder="PASSWORD">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
        </div>
        <button class="main-btn" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <h2 id="welcomeText">WELCOME</h2>
        <div class="menu-grid">
            <button class="menu-btn" onclick="navTo('listPage')">
                ALL EMPLOYEES <span class="count-num" id="countAll">0</span>
            </button>
            <button class="menu-btn" onclick="showFiltered('Active')">
                ACTIVE <span class="count-num" id="countActive">0</span>
            </button>
            <button class="menu-btn" onclick="showFiltered('Inactive')">
                INACTIVE <span class="count-num" id="countInactive">0</span>
            </button>
            <button id="btnAdd" class="menu-btn" onclick="navTo('addPage')">
                ADD NEW <span class="count-num">+</span>
            </button>
            <button id="btnAdmin" class="menu-btn hidden" onclick="navTo('adminPage')" style="grid-column: span 2;">ADMIN PANEL</button>
        </div>
        <button class="main-btn" style="margin-top: 20px; background: #666;" onclick="logout()">LOGOUT</button>
    </div>
<div style="text-align:right; cursor:pointer;" onclick="openProfile()">👤 SETTINGS</div>
    <div id="adminPage" class="container hidden">
        <h2>ADMIN - USER MANAGEMENT</h2>
        <div style="border: 1px solid #000; padding: 15px; margin-bottom: 20px;">
            <input type="text" id="newU" placeholder="NEW USERNAME">
            <input type="text" id="newP" placeholder="NEW PASSWORD">
            <div style="text-align: left; padding: 10px;">
                <label><input type="checkbox" id="pAdd"> CAN ADD DATA</label><br>
                <label><input type="checkbox" id="pDel"> CAN DELETE DATA</label>
            </div>
            <button class="main-btn" onclick="createNewUser()">SAVE USER</button>
        </div>
        <table id="userTable">
            <thead><tr><th>NAME</th><th>ACTION</th></tr></thead>
            <tbody id="userListBody"></tbody>
        </table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="listPage" class="container hidden">
        <h2 id="listTitle">EMPLOYEE DATABASE</h2>
        <input type="text" onkeyup="searchEmp(this.value)" placeholder="SEARCH NAME, ID OR PHONE...">
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>ID</th><th>NAME/STATUS</th><th>DESIG</th><th>PHONE</th><th>ACTION</th></tr></thead>
                <tbody id="empListBody"></tbody>
            </table>
        </div>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK TO DASHBOARD</button>
    </div>

    <div id="addPage" class="container hidden">
        <h2>ADD NEW RECORD</h2>
        <input type="text" id="eId" placeholder="EMPLOYEE ID">
        <input type="text" id="eName" placeholder="FULL NAME">
        <input type="text" id="eDes" placeholder="DESIGNATION">
        <input type="text" id="ePho" placeholder="PHONE NUMBER">
        <button class="main-btn" onclick="saveEmployee()">SAVE TO CLOUD</button>
        <button class="main-btn" style="background:#444" onclick="navTo('dashboardPage')">CANCEL</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<div id="profileModal" class="container hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100; background:white;">
    <h3>UPDATE PROFILE</h3>
    <input type="text" id="updName" placeholder="NEW USERNAME">
    <input type="password" id="updPass" placeholder="NEW PASSWORD">
    <button class="main-btn" onclick="updateCloudProfile()">UPDATE NOW</button>
    <button onclick="navTo('dashboardPage')">CLOSE</button>
</div>
    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDrzmh9TbcyuLAG6LkoKERcBuHvQ-sf0oU",
            authDomain: "my-hrm-project-d1aef.firebaseapp.com",
            projectId: "my-hrm-project-d1aef",
            storageBucket: "my-hrm-project-d1aef.firebasestorage.app",
            messagingSenderId: "165053525844",
            appId: "1:165053525844:web:6abc82aca238d9e84862c1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const MASTER_ADMIN = "Meskay";
        const MASTER_PASS = "Pakistan786";
        let currentFilter = "All";

        // NAVIGATION
        function navTo(pageId) {
            window.location.hash = pageId;
            renderPage(pageId);
        }

        window.onhashchange = function() {
            const page = window.location.hash.replace('#', '') || 'loginPage';
            renderPage(page);
        };

        function renderPage(pageId) {
            const loggedIn = sessionStorage.getItem("isLoggedIn");
            if (!loggedIn && pageId !== 'loginPage') pageId = 'loginPage';
            
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(pageId)?.classList.remove('hidden');
            
            if(pageId === 'adminPage') fetchUsers();
            if(pageId === 'listPage') fetchEmployees();
            if(pageId === 'dashboardPage') updateCounts();
            setupPermissions();
        }

        // LOGIN
        async function handleLogin() {
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            
            if(u === MASTER_ADMIN && p === MASTER_PASS) {
                loginAs({name: u, role: 'admin', pAdd: true, pDel: true});
                return;
            }

            const snapshot = await db.collection("users").where("name", "==", u).where("pass", "==", p).get();
            if(!snapshot.empty) {
                loginAs(snapshot.docs[0].data());
            } else { alert("LOGIN FAILED!"); }
        }

        function loginAs(user) {
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("currentUser", JSON.stringify(user));
            navTo('dashboardPage');
        }

        function setupPermissions() {
            const user = JSON.parse(sessionStorage.getItem("currentUser"));
            if(!user) return;
            document.getElementById("welcomeText").innerText = "USER: " + user.name.toUpperCase();
            document.getElementById("btnAdmin").classList.toggle("hidden", user.name !== MASTER_ADMIN);
            const addBtn = document.getElementById("btnAdd");
            if(addBtn) addBtn.style.display = (user.pAdd || user.name === MASTER_ADMIN) ? "block" : "none";
        }

        // COUNTS UPDATE (LIVE)
        async function updateCounts() {
            const snapshot = await db.collection("employees").get();
            let all = 0, active = 0, inactive = 0;
            snapshot.forEach(doc => {
                all++;
                if(doc.data().status === "Active") active++;
                else inactive++;
            });
            document.getElementById("countAll").innerText = all;
            document.getElementById("countActive").innerText = active;
            document.getElementById("countInactive").innerText = inactive;
        }

        // EMPLOYEES LOGIC
        async function saveEmployee() {
            const emp = { 
                id: document.getElementById("eId").value, 
                name: document.getElementById("eName").value, 
                des: document.getElementById("eDes").value, 
                pho: document.getElementById("ePho").value,
                status: "Active" 
            };
            if(!emp.id || !emp.name) return alert("ID and Name Required!");
            await db.collection("employees").add(emp);
            alert("SAVED TO CLOUD!");
            navTo('dashboardPage');
        }

        function showFiltered(status) {
            currentFilter = status;
            navTo('listPage');
        }

        async function fetchEmployees() {
            const body = document.getElementById("empListBody");
            body.innerHTML = "Syncing...";
            document.getElementById("listTitle").innerText = currentFilter + " EMPLOYEES";
            
            const user = JSON.parse(sessionStorage.getItem("currentUser"));
            let query = db.collection("employees");
            if(currentFilter !== "All") query = query.where("status", "==", currentFilter);
            
            const snapshot = await query.get();
            body.innerHTML = "";
            snapshot.forEach(doc => {
                const e = doc.data();
                const rowClass = e.status === 'Active' ? 'active-row' : 'inactive-row';
                const delBtn = (user.name === MASTER_ADMIN || user.pDel) ? `<button class="action-btn" onclick="deleteDoc('employees','${doc.id}', fetchEmployees)">DEL</button>` : "";
                const statusBtn = `<button class="action-btn" onclick="toggleStatus('${doc.id}', '${e.status}')">${e.status === 'Active' ? 'DEACTIVATE' : 'ACTIVATE'}</button>`;
                
                body.innerHTML += `<tr class="${rowClass}">
                    <td>${e.id}</td>
                    <td>${e.name.toUpperCase()}<br><span class="status-tag">${e.status}</span></td>
                    <td>${e.des}</td>
                    <td>${e.pho}</td>
                    <td>${statusBtn} ${delBtn}</td>
                </tr>`;
            });
            updateCounts();
        }

        async function toggleStatus(docId, currentStatus) {
            const newStatus = (currentStatus === "Active") ? "Inactive" : "Active";
            await db.collection("employees").doc(docId).update({ status: newStatus });
            fetchEmployees();
        }

        // ADMIN LOGIC
        async function createNewUser() {
            const n = document.getElementById("newU").value;
            const p = document.getElementById("newP").value;
            if(!n || !p) return alert("EMPTY!");
            await db.collection("users").add({
                name: n, pass: p, role: 'user', 
                pAdd: document.getElementById("pAdd").checked, 
                pDel: document.getElementById("pDel").checked
            });
            alert("USER CREATED!");
            fetchUsers();
        }

        async function fetchUsers() {
            const body = document.getElementById("userListBody");
            body.innerHTML = "";
            const snapshot = await db.collection("users").get();
            snapshot.forEach(doc => {
                body.innerHTML += `<tr><td>${doc.data().name}</td><td><button onclick="deleteDoc('users','${doc.id}', fetchUsers)">REMOVE</button></td></tr>`;
            });
        }

        async function deleteDoc(coll, id, callback) {
            if(confirm("DELETE PERMANENTLY?")) {
                await db.collection(coll).doc(id).delete();
                callback();
            }
        }

        function searchEmp(val) {
            const filter = val.toUpperCase();
            const tr = document.getElementById("empListBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                tr[i].style.display = tr[i].innerText.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        function togglePass() {
            const p = document.getElementById("password");
            p.type = p.type === "password" ? "text" : "password";
        }

        function logout() { sessionStorage.clear(); navTo('loginPage'); }

        window.onload = function() {
            const hash = window.location.hash.replace('#', '');
            renderPage(hash || 'loginPage');
        }
    </script>
</body>
</html>
