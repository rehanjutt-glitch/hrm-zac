<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. LOGIN SECTION -->
    <div id="login-container" class="auth-box">
        <h2>Login System</h2>
        <form id="login-form">
            <div class="input-group">
                <label>Email / Username</label>
                <input type="email" id="login-email" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <!-- 2. MAIN ADMIN DASHBOARD (Hidden initially) -->
    <div id="dashboard-container" class="dashboard" style="display: none;">
        
        <!-- Top Header Bar -->
        <header class="top-bar">
            <h1>EMS Dashboard</h1>
            
            <div class="user-profile">
                <span id="user-role-badge" class="badge">Admin</span>
                <div class="profile-avatar">
                    <img id="profile-img" src="https://via.placeholder.com/150" alt="Profile">
                    <input type="file" id="upload-avatar" accept="image/*" style="display:none;">
                    <label for="upload-avatar" class="upload-btn">📸</label>
                </div>
                <button id="logout-btn" class="btn btn-danger">Logout</button>
            </div>
        </header>

        <!-- Main Layout with Sidebar & Content -->
        <div class="main-layout">
            
            <!-- Sidebar Navigation -->
            <nav class="sidebar">
                <ul>
                    <li><a href="#summary" class="sidebar-link active">Overview</a></li>
                    <li><a href="#salary-calc" class="sidebar-link">Salary Calculator</a></li>
                    <li id="admin-only-link"><a href="#user-management" class="sidebar-link">User Management (Admin)</a></li>
                </ul>
            </nav>

            <!-- Content Workspace -->
            <main class="content-area">
                
                <!-- Status Cards Grid -->
                <section id="summary" class="stats-grid dashboard-section">
                    <div class="card blue">
                        <h3>Total Employees</h3>
                        <p id="total-employees">0</p>
                    </div>
                    <div class="card green">
                        <h3>Active</h3>
                        <p id="active-employees">0</p>
                    </div>
                    <div class="card red">
                        <h3>Inactive</h3>
                        <p id="inactive-employees">0</p>
                    </div>
                </section>

                <!-- Salary & Attendance Config -->
                <section id="salary-calc" class="management-section dashboard-section" style="display: none;">
                    <h2>Payroll & Salary Calculator</h2>
                    <form id="salary-form">
                        <div class="form-row">
                            <input type="text" id="emp-name" placeholder="Employee Name" required>
                            <select id="emp-type">
                                <option value="monthly">Monthly Fixed</option>
                                <option value="daily">Daily Wager</option>
                            </select>
                            <input type="number" id="base-salary" placeholder="Base Salary / Daily Rate" required>
                            <input type="number" id="leaves-days" placeholder="Leaves Taken (Days)" value="0">
                        </div>
                        <button type="button" id="calc-salary-btn" class="btn">Calculate Payroll</button>
                    </form>
                    <div class="salary-result">
                        <h3>Net Payable Amount: <span id="final-salary">0</span> PKR</h3>
                    </div>
                </section>

                <!-- User Account Creation (Access Control) -->
                <section id="user-management" class="management-section dashboard-section" style="display: none;">
                    <h2>Create User Account & Access Control</h2>
                    <form id="create-user-form">
                        <div class="form-row">
                            <input type="text" id="new-username" placeholder="Username" required>
                            <input type="email" id="new-user-email" placeholder="Email Address" required>
                            <input type="password" id="new-user-password" placeholder="Password" required>
                            <select id="new-user-role">
                                <option value="staff">Staff</option>
                                <option value="manager">Manager</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">Add System User</button>
                    </form>
                </section>

            </main>
        </div>
    </div>

    <!-- Script connection at bottom -->
    <script src="script.js"></script>
</body>
</html>
