<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM MASTER - FIXED LOGIN</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-align: center; color: #333; }
        .container { width: 95%; max-width: 900px; margin: 20px auto; background: #fff; padding: 25px; border: 3px solid #000; box-shadow: 10px 10px 0 #000; border-radius: 8px; }
        .hidden { display: none; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #000; font-size: 16px; box-sizing: border-box; font-weight: bold; }
        .main-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }

        .pass-box { position: relative; }
        .eye-icon { position: absolute; right: 15px; top: 25px; cursor: pointer; font-size: 20px; z-index: 10; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 25px 10px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; position: relative; border-radius: 5px; }
        .badge { display: block; font-size: 24px; color: #ffeb3b; margin-top: 8px; }
        .master-btn { grid-column: span 2; background: #1a237e; }
        .sal-btn { background: #2e7d32; }
        .rep-btn { background: #01579b; }

        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; position: relative; }
        .profile-trigger { display: flex; align-items: center; cursor: pointer; background: #000; color: #fff; padding: 8px 15px; border: 2px solid #000; }
        .nav-img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; border: 1px solid #fff; object-fit: cover; }
        .dropdown-menu { position: absolute; top: 100%; right: 0; background: #fff; border: 3px solid #000; width: 220px; z-index: 1000; padding: 15px; box-shadow: 5px 5px 0 #000; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 2px solid #000; padding: 12px; text-align: center; }
        th { background: #eee; }

        .calc-info { background: #e3f2fd; padding: 15px; border: 2px dashed #000; margin: 10px 0; font-weight: bold; }

        /* Salary Slip Design */
        .slip-card { border: 2px solid #000; padding: 30px; margin: 20px auto; width: 85%; background: #fff; text-align: left; }
        .slip-header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; padding-bottom: 10px; }
        .slip-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 18px; }
        .sig-container { display: flex; justify-content: space-between; margin-top: 50px; }
        .sig-box { border-top: 2px solid #000; width: 40%; text-align: center; padding-top: 5px; font-weight: bold; }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            .container { border: none; box-shadow: none; width: 100%; }
            .slip-card { page-break-after: always; width: 100%; margin: 0 0 20px 0; border: 1px solid #000; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loginPage" class="container">
        <h1>MESKAY HRM CLOUD</h1>
        <p>Please enter your credentials to login</p>
        <input type="text" id="username" placeholder="Username / Login ID">
        <div class="pass-box">
            <input type="password" id="password" placeholder="Password">
            <i class="fa-solid fa-eye eye-icon" id="eyeToggle"></i>
        </div>
        <button class="main-btn" id="loginSubmit">SECURE LOGIN</button>
    </div>

    <div id="dashboardPage" class="container hidden">
        <div class="top-bar">
            <div class="profile-trigger" id="profileToggle">
                <img id="navPic" src="https://via.placeholder.com/40" class="nav-img">
                <span id="navName">Loading...</span>
            </div>
            <div id="profileMenu" class="dropdown-menu hidden">
                <img id="menuPic" src="https://via.placeholder.com/60" style="border-radius:50%; border:2px solid #000"><br>
                <input type="file" id="picUpload" onchange="uploadImage()" hidden>
                <label for="picUpload" style="cursor:pointer; color:blue; text-decoration:underline; font-size:12px;">Change Photo</label>
                <hr>
                <button class="main-btn" id="adminBtnLink" onclick="navTo('adminPage')">⚙️ Admin Panel</button>
                <button class="main-btn btn-red" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="showView('all')">ALL EMPLOYEES <span class="badge" id="cntAll">0</span></button>
            <button class="menu-btn" onclick="showView('Active')">ACTIVE STAFF <span class="badge" id="cntActive">0</span></button>
            <button class="menu-btn" onclick="showView('Inactive')">INACTIVE STAFF <span class="badge" id="cntInactive">0</span></button>
            <button class="menu-btn" onclick="navTo('addPage')">ADD NEW EMPLOYEE</button>
            <button class="menu-btn master-btn" onclick="showView('update')">UPDATE & MANAGE INFO</button>
            <button class="menu-btn sal-btn" onclick="navTo('salaryPage')">SALARY CALCULATOR</button>
            <button class="menu-btn rep-btn" onclick="navTo('reportPage')">REPORTS & SLIPS</button>
        </div>
    </div>

    <div id="addPage" class="container hidden">
        <h2>Add New Employee</h2>
        <input type="text" id="newEmpId" placeholder="Employee ID">
        <input type="text" id="newEmpName" placeholder="Full Name">
        <select id="newEmpStatus"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
        <button class="main-btn btn-green" onclick="saveNewEmployee()">SAVE EMPLOYEE</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="listPage" class="container hidden">
        <h2 id="listTitle">Records</h2>
        <table><thead id="tableHead"></thead><tbody id="empTableBody"></tbody></table>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="salaryPage" class="container hidden">
        <h2>Salary Calculator</h2>
        <select id="salEmpList"></select>
        <label>From:</label><input type="date" id="startDate" onchange="autoCalcDays()">
        <label>To:</label><input type="date" id="endDate" onchange="autoCalcDays()">
        <div class="calc-info">Days: <span id="displayDays">0</span></div>
        <input type="number" id="salWages" placeholder="Daily Rate" onkeyup="autoCalcDays()">
        <div class="calc-info" style="background:#c8e6c9">Total: <span id="displayTotal">0</span></div>
        <button class="main-btn btn-green" onclick="saveSalary()">SAVE TO CLOUD</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <div id="reportPage" class="container hidden">
        <div class="no-print">
            <h2>Salary Reports</h2>
            <div style="display:flex; gap:10px;">
                <input type="month" id="repMonth">
                <select id="repEmpFilter"><option value="all">All Staff</option></select>
            </div>
            <button class="main-btn btn-green" onclick="generateReport()">GENERATE</button>
            <button class="main-btn" onclick="window.print()">PRINT</button>
            <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
        </div>
        <div id="printArea"></div>
    </div>

    <div id="adminPage" class="container hidden">
        <h2>Admin Management</h2>
        <input type="text" id="newPersonName" placeholder="Full Name">
        <input type="text" id="newLoginName" placeholder="Login Username">
        <input type="text" id="newLoginPass" placeholder="Login Password">
        <select id="newRole"><option value="user">User</option><option value="manager">Manager</option><option value="admin">Admin</option></select>
        <button class="main-btn btn-green" onclick="createNewUser()">CREATE USER</button>
        <button class="main-btn" onclick="navTo('dashboardPage')">BACK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDrzmh9TbcyuLAG6LkoKERcBuHvQ-sf0oU",
            authDomain: "my-hrm-project-d1aef.firebaseapp.com",
            projectId: "my-hrm-project-d1aef",
            storageBucket: "my-hrm-project-d1aef.appspot.com",
            messagingSenderId: "165053525844",
            appId: "1:165053525844:web:6abc82aca238d9e84862c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;

        // FIXED LOGIN SYSTEM
        document.getElementById("loginSubmit").addEventListener("click", handleLogin);
        document.getElementById("eyeToggle").addEventListener("click", () => {
            const p = document.getElementById("password");
            p.type = p.type === "password" ? "text" : "password";
        });

        async function handleLogin() {
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();

            if (!u || !p) return alert("Please fill all fields!");

            // Master Login
            if (u === "Meskay" && p === "Pakistan786") {
                currentUser = { name: "Master Admin", role: "admin", loginU: "Meskay" };
                return loginOk();
            }

            try {
                const snap = await db.collection("users").where("loginU", "==", u).where("pass", "==", p).get();
                if (!snap.empty) {
                    currentUser = snap.docs[0].data();
                    loginOk();
                } else {
                    alert("Invalid Username or Password!");
                }
            } catch (e) { alert("Connection Error!"); }
        }

        function loginOk() {
            document.getElementById("navName").innerText = currentUser.name;
            document.getElementById("adminBtnLink").style.display = (currentUser.role === 'admin') ? 'block' : 'none';
            navTo('dashboardPage');
            loadProfilePic();
        }

        // NAVIGATION
        function navTo(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'dashboardPage') updateCounts();
            if(id === 'salaryPage') loadSalEmps();
            if(id === 'reportPage') loadReportFilters();
        }

        // PROFILE MENU
        document.getElementById("profileToggle").onclick = () => document.getElementById("profileMenu").classList.toggle("hidden");

        // CORE FUNCTIONS
        async function updateCounts() {
            const snap = await db.collection("employees").get();
            let all = 0, act = 0, inact = 0;
            snap.forEach(doc => { all++; if(doc.data().status === 'Active') act++; else inact++; });
            document.getElementById("cntAll").innerText = all;
            document.getElementById("cntActive").innerText = act;
            document.getElementById("cntInactive").innerText = inact;
        }

        async function saveNewEmployee() {
            const id = document.getElementById("newEmpId").value;
            const name = document.getElementById("newEmpName").value;
            if(!id || !name) return alert("Missing Data!");
            await db.collection("employees").add({ id: id, name: name, status: document.getElementById("newEmpStatus").value });
            alert("Added!"); navTo('dashboardPage');
        }

        function autoCalcDays() {
            const s = new Date(document.getElementById("startDate").value);
            const e = new Date(document.getElementById("endDate").value);
            const r = document.getElementById("salWages").value || 0;
            if (s && e && e >= s) {
                const days = Math.ceil(Math.abs(e - s) / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById("displayDays").innerText = days;
                document.getElementById("displayTotal").innerText = days * r;
            }
        }

        async function loadSalEmps() {
            const sel = document.getElementById("salEmpList");
            sel.innerHTML = "";
            const snap = await db.collection("employees").where("status","==","Active").get();
            snap.forEach(doc => sel.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
        }

        async function saveSalary() {
            const n = document.getElementById("salEmpList").options[document.getElementById("salEmpList").selectedIndex].text;
            await db.collection("salaries").add({
                empName: n, startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                total: document.getElementById("displayTotal").innerText,
                days: document.getElementById("displayDays").innerText,
                rate: document.getElementById("salWages").value,
                dateKey: document.getElementById("endDate").value.substring(0,7)
            });
            alert("Salary Recorded!"); navTo('dashboardPage');
        }

        async function loadReportFilters() {
            const f = document.getElementById("repEmpFilter");
            f.innerHTML = `<option value="all">All Staff</option>`;
            const snap = await db.collection("employees").get();
            snap.forEach(doc => f.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
        }

        async function generateReport() {
            const m = document.getElementById("repMonth").value;
            const filter = document.getElementById("repEmpFilter").value;
            const area = document.getElementById("printArea");
            let q = db.collection("salaries").where("dateKey", "==", m);
            if(filter !== "all") q = q.where("empName", "==", filter);

            const snap = await q.get();
            area.innerHTML = snap.empty ? "<h3>No Records Found.</h3>" : "";
            snap.forEach(doc => {
                const s = doc.data();
                area.innerHTML += `
                    <div class="slip-card">
                        <div class="slip-header"><h2>MESKAY & FEMTEE</h2><p>Monthly Salary Voucher</p></div>
                        <div class="slip-row"><span>Employee:</span> <span>${s.empName}</span></div>
                        <div class="slip-row"><span>Period:</span> <span>${s.startDate} to ${s.endDate}</span></div>
                        <div class="slip-row"><span>Days:</span> <span>${s.days}</span></div>
                        <div class="slip-row"><span>Rate:</span> <span>${s.rate} PKR</span></div>
                        <hr><div class="slip-row"><h3>NET PAYABLE:</h3> <h3>${s.total} PKR</h3></div>
                        <div class="sig-container">
                            <div class="sig-box">Prepared By</div>
                            <div class="sig-box">Receiving Signature</div>
                        </div>
                    </div>`;
            });
        }

        async function showView(mode) {
            navTo('listPage');
            const h = document.getElementById("tableHead");
            const b = document.getElementById("empTableBody");
            h.innerHTML = `<tr><th>ID</th><th>Name</th><th>Status</th>${mode==='update'?'<th>Action</th>':''}</tr>`;
            let q = db.collection("employees");
            if(mode === 'Active' || mode === 'Inactive') q = q.where("status","==",mode);
            const snap = await q.get();
            b.innerHTML = "";
            snap.forEach(doc => {
                const e = doc.data();
                const btn = (mode==='update')?`<td><button onclick="toggleStatus('${doc.id}','${e.status}')">Toggle</button> <button onclick="delEmp('${doc.id}')">Delete</button></td>`:'';
                b.innerHTML += `<tr><td>${e.id}</td><td>${e.name}</td><td>${e.status}</td>${btn}</tr>`;
            });
        }

        async function toggleStatus(id, s) { await db.collection("employees").doc(id).update({ status: s==='Active'?'Inactive':'Active' }); showView('update'); }
        async function delEmp(id) { if(confirm("Delete?")) { await db.collection("employees").doc(id).delete(); showView('update'); } }
        async function createNewUser() {
            await db.collection("users").add({ name: document.getElementById("newPersonName").value, loginU: document.getElementById("newLoginName").value, pass: document.getElementById("newLoginPass").value, role: document.getElementById("newRole").value });
            alert("New Login Created!"); navTo('dashboardPage');
        }
        async function uploadImage() {
            const file = document.getElementById("picUpload").files[0];
            await storage.ref('profiles/' + currentUser.loginU).put(file);
            loadProfilePic();
        }
        async function loadProfilePic() {
            try {
                const url = await storage.ref('profiles/' + currentUser.loginU).getDownloadURL();
                document.getElementById("navPic").src = url; document.getElementById("menuPic").src = url;
            } catch(e) {}
        }
        function logout() { location.reload(); }
    </script>
</body>
</html>
